<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Divyanshu Raj</title>
  <meta name="robots" content="noindex, follow"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      background: #060910; color: #F1F5F9; font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center; -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-image:
        radial-gradient(ellipse 800px 600px at 70% 30%, rgba(37,99,235,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 500px 500px at 20% 80%, rgba(124,58,237,0.05) 0%, transparent 60%);
    }
    .code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #06B6D4;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px;
      border: 1px solid rgba(6,182,212,0.3); background: rgba(6,182,212,0.05);
      display: inline-block; padding: 6px 16px; border-radius: 2px;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: -0.03em;
      font-size: clamp(4rem, 14vw, 8rem); line-height: 1;
      background: linear-gradient(135deg, #2563EB 0%, #06B6D4 50%, #7C3AED 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 16px;
    }
    p {
      color: #64748B; font-size: 1rem; max-width: 420px; margin: 0 auto 36px; line-height: 1.7;
    }
    a.home {
      display: inline-flex; align-items: center; gap: 8px;
      background: #2563EB; color: #fff; padding: 13px 26px; border-radius: 6px;
      font-weight: 600; font-size: 0.9rem; text-decoration: none;
      box-shadow: 0 0 32px rgba(37,99,235,0.3); transition: all 0.2s;
    }
    a.home:hover { background: #1D4ED8; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(37,99,235,0.5); }
  </style>
</head>
<body>
  <div>
    <div class="code">error 404</div>
    <h1>404</h1>
    <p>This route doesn't exist — looks like a broken link or a page that moved. Let's get you back to somewhere real.</p>
    <a class="home" href="/">← Back to Home</a>
  </div>
</body>
</html>
